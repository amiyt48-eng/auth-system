<div class="container">

<h3>User Management</h3>

<div class="card p-3 mb-4">

<div class="row">

<div class="col-md-4">
<input class="form-control"
placeholder="Name"
[(ngModel)]="name">
</div>

<div class="col-md-4">
<input class="form-control"
placeholder="Email"
[(ngModel)]="email">
</div>

<div class="col-md-4">
<button class="btn btn-success"
(click)="saveUser()">

{{editId ? 'Update':'Add'}}

</button>
</div>

</div>

</div>


<table class="table table-bordered table-striped">

<tr>
<th>Name</th>
<th>Email</th>
<th width="150">Actions</th>
</tr>

<tr *ngFor="let user of users">

<td>{{user.name}}</td>
<td>{{user.email}}</td>

<td>

<button class="btn btn-warning btn-sm me-2"
(click)="editUser(user)">
Edit
</button>

<button class="btn btn-danger btn-sm"
(click)="deleteUser(user._id)">
Delete
</button>

</td>

</tr>

</table>

</div>
